spring.application.name=automation-practice-app
server.port=8080

# ─── SQLite DataSource ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:sqlite:automation_practice.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# HikariCP pool - keep at 5, WAL mode allows concurrent reads
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
# Enable WAL mode for SQLite - allows one writer + multiple readers
spring.datasource.hikari.connection-init-sql=PRAGMA journal_mode=WAL; PRAGMA synchronous=NORMAL;

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# KEY FIX: Disable Hibernate 6's new sequence-table generator.
# With new_generator_mappings=false, IDENTITY uses SQLite's last_insert_rowid()
# instead of a separate table that needs an isolated/second connection.
spring.jpa.properties.hibernate.id.new_generator_mappings=false

# Disable getGeneratedKeys (not supported by SQLite JDBC driver)
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=false

# ─── Thymeleaf ──────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ─── File Upload ────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Logging ────────────────────────────────────────────────────────────────
logging.level.com.automationpractice=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=WARN
