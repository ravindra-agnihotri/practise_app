<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit User - AutoPractice</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<nav class="navbar">
    <a href="/" class="navbar-brand">🤖 Auto<span>Practice</span></a>
    <ul class="navbar-nav">
        <li><a href="/users" class="nav-link">← Back to Users</a></li>
    </ul>
</nav>

<div class="page-wrapper">
<div class="container" style="max-width:700px;">
    <div class="page-header">
        <div class="badge-tag">✏️ Edit User</div>
        <h1 class="page-title" th:text="'Edit: ' + ${user.fullName}">Edit User</h1>
    </div>

    <div class="card">
        <div class="card-body">
            <form th:action="@{'/users/' + ${user.id} + '/edit'}" th:object="${user}" method="post" id="edit-user-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label required" for="edit-fname">First Name</label>
                        <input type="text" id="edit-fname" th:field="*{firstName}" class="form-control" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label required" for="edit-lname">Last Name</label>
                        <input type="text" id="edit-lname" th:field="*{lastName}" class="form-control" required/>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label required" for="edit-email">Email</label>
                        <input type="email" id="edit-email" th:field="*{email}" class="form-control" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="edit-phone">Phone</label>
                        <input type="tel" id="edit-phone" th:field="*{phoneNumber}" class="form-control"/>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="edit-gender">Gender</label>
                        <select id="edit-gender" th:field="*{gender}" class="form-control">
                            <option value="">-- Select --</option>
                            <option th:each="g : ${genders}" th:value="${g}" th:text="${g}">MALE</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="edit-country">Country</label>
                        <input type="text" id="edit-country" th:field="*{country}" class="form-control"/>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="edit-bio">Bio</label>
                    <textarea id="edit-bio" th:field="*{bio}" class="form-control" rows="3" maxlength="1000"></textarea>
                </div>
                <div style="display:flex; gap:16px; margin-bottom:24px;">
                    <label class="form-check">
                        <input type="checkbox" id="edit-active" th:field="*{active}" class="form-check-input"/>
                        <span class="form-check-label">Active Account</span>
                    </label>
                    <label class="form-check">
                        <input type="checkbox" id="edit-newsletter" th:field="*{newsletterSubscribed}" class="form-check-input"/>
                        <span class="form-check-label">Newsletter Subscribed</span>
                    </label>
                </div>
                <div style="display:flex; gap:12px;">
                    <button type="submit" id="btn-update-user" class="btn btn-primary">Update User</button>
                    <a href="/users" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
